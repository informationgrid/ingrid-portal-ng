                "scenario": {
                    "label": "Fachliche Abbildungen/Grafiken",
                    "query": {
                        "filter": {
                            "term": {
                                "simparamtype": "Grafik"
                            }
                        }
                    }
                }
            }
        },
        {
            "id": "simspatialdimension",
            "label": "Räumliche Dimensionalität",
            "list_limit": 6,
            "query": {
                "terms": {
                    "field": "simspatialdimension",
                    "min_doc_count": 0
                }
            },
            "search": "t017_url_ref.datatype:%s"
        },
        {
            "id": "datenformat",
            "label": "Datenformat",
            "list_limit": 6,
            "query": {
                "terms": {
                    "field": "t017_url_ref.datatype",
                    "min_doc_count": 0
                }
            },
            "search": "t017_url_ref.datatype:%s"
        },
        {
            "id": "timeref",
            "filter": "{\"range\": {\"t01_object.time_from\": {\"gte\": \"%s0*\", \"lte\": \"%s9*\"}}}"
        },
        {
            "id": "bbox",
            "filter": "{\"bool\": {\"should\": [{\"nested\": {\"path\": \"spatial\",\"query\": {\"bool\": {\"must\": [{\"geo_bounding_box\": {\"spatial.geometries\": {\"top_left\": [%f,%f],\"bottom_right\": [%f,%f]}}},{\"exists\": {\"field\": \"spatial.geometries\"}}]}}}},{\"bool\": {\"must\": [{\"range\": {\"x1\": {\"gte\": %f}}},{\"range\": {\"y2\": {\"lte\": %f}}},{\"range\": {\"y1\": {\"gte\": %f}}},{\"range\": {\"x2\": {\"lte\": %f}}}],\"must_not\":{\"nested\":{\"path\":\"spatial\",\"query\":{\"bool\":{\"must\":[{\"exists\":{\"field\":\"spatial.geometries\"}}]}}}}}}],\"minimum_should_match\": 1}}"
        }
    ]
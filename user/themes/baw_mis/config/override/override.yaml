                    "field": "method",
                    "min_doc_count": 0
                }
            },
            "search": "method:%s"
        },
        {
            "id": "simmodeltype",
            "label": "Modelldaten",
            "facets": {
                "basisdaten": {
                    "label": "Basisdaten",
                    "query": {
                        "filter": {
                            "bool": {
                                "should": [
                                    {
                                        "term": {
                                            "simparamtype": "Randbedingung"
                                        }
                                    },
                                    {
                                        "term": {
                                            "simparamtype": "Anfangsbedingung"
                                        }
                                    },
                                    {
                                        "term": {
                                            "simparamtype": "Peilung"
                                        }
                                    },
                                    {
                                        "term": {
                                            "simparamtype": "Bathymetrie"
                                        }
                                    },
                                    {
                                        "term": {
                                            "simparamtype": "Kennwort"
                                        }
                                    }
                                ]
                            }
                        }
                    }
                },
                "modellergebnisse": {
                    "label": "Modellergebnisse",
                    "query": {
                        "filter": {
                            "term": {
                                "simparamtype": "Ergebnis"
                            }
                        }
                    }

hit_search:
    facet_config: [
        {
            "id": "categ",
            "facets": {
                "project": {
                    "codelist": "8000",
                    "codelist_entry_id": "4",
                    "query": {
                        "filter": {
                            "term": {
                                "t01_object.obj_class": "4"
                            }
                        }
                    }
                },
                "geodata": {
                    "codelist": "8000",
                    "codelist_entry_id": "1",
                    "query": {
                        "filter": {
                            "term": {
                                "t01_object.obj_class": "1"
                            }
                        }
                    }
                },
                "geoservice": {
                    "codelist": "8000",
                    "codelist_entry_id": "3",
                    "query": {
                        "filter": {
                            "term": {
                                "t01_object.obj_class": "3"
                            }
                        }
                    }
                },
                "document": {
                    "codelist": "8000",
                    "codelist_entry_id": "2",
                    "query": {
                        "filter": {
                            "term": {
                                "t01_object.obj_class": "2"
                            }
                        }
                    }
                },
                "database": {
                    "codelist": "8000",
                    "codelist_entry_id": "5",
                    "query": {
                        "filter": {
                            "term": {
                                "t01_object.obj_class": "5"
                            }
                        }
                    }
                },
                "inspire": {
                    "label": "Inspire",
                    "query": {
                        "filter": {
                            "bool": {
                                "should": [
                                    {
                                        "term": {
                                            "t04_search.searchterm": "inspire"
                                        }
                                    },
                                    {
                                        "term": {
                                            "t04_search.searchterm": "inspireidentifiziert"
                                        }
                                    }
                                ]
                            }
                        }
                    },
                },
                "opendata": {
                    "label": "Open Data",
                    "query": {
                        "filter": {
                            "bool": {
                                "should": [
                                    {
                                        "term": {
                                            "t04_search.searchterm": "opendata"
                                        }
                                    },
                                    {
                                        "term": {
                                            "t04_search.searchterm": "opendataident"
                                        }
                                    }
                                ]
                            }
                        }
                    }
                },
                "hvd": {
                    "label": "HVD",
                    "query": {
                        "filter": {
                            "term": {
                                "is_hvd": "true"
                            }
                        }
                    }
                }
            }
        },
        {
            "id": "waterway",
            "list_limit": 6,
            "query": {
                "terms": {
                    "field": "bwstr-bwastr_name",
                    "min_doc_count": 0
                }
            },
            "search": "bwstr-bwastr_name:%s"
        },
        {
            "id": "type",
            "facets": {
                "type_simulation": {
                    "query": {
                        "filter": {
                            "term": {
                                "data_category": "Simulationsdaten"
                            }
                        }
                    }
                },
                "messdaten": {
                    "query": {
                        "filter": {
                            "term": {
                                "data_category": "Messdaten"
                            }
                        }
                    }
                },
                "luftbilder": {
                    "query": {
                        "filter": {
                            "term": {
                                "data_category": "Luftbilder"
                            }
                        }
                    }
                },
                "maps": {
                    "query": {
                        "filter": {
                            "wildcard": {
                                "capabilities_url": "http*"
                            }
                        }
                    }
                }
            }
        },
        {
            "id": "simulation",
            "facets": {
                "preprocessing": {
                    "query": {
                        "filter": {
                            "term": {
                                "simulation_data_type": "Preprocessing"
                            }
                        }
                    }
                },
                "variant": {
                    "query": {
                        "filter": {
                            "term": {
                                "simulation_data_type": "Variante"
                            }
                        }
                    }
                },
                "scenario": {
                    "query": {
                        "filter": {
                            "term": {
                                "simulation_data_type": "Szenario"
                            }
                        }
                    }
                },
                "model": {
                    "query": {
                        "filter": {
                            "term": {
                                "simulation_data_type": "Simulationsmodell"
                            }
                        }
                    }
                },
                "run": {
                    "query": {
                        "filter": {
                            "term": {
                                "simulation_data_type": "Simulationslauf"
                            }
                        }
                    }
                },
                "file": {
                    "query": {
                        "filter": {
                            "term": {
                                "simulation_data_type": "Simulationsdatei"
                            }
                        }
                    }
                },
                "postprocessing": {
                    "query": {
                        "filter": {
                            "term": {
                                "simulation_data_type": "Postprocessing"
                            }
                        }
                    }
                }
            }
        },
        {
            "id": "datenformat",
            "list_limit": 6,
            "query": {
                "terms": {
                    "field": "t017_url_ref.datatype",
                    "min_doc_count": 0
                }
            },
            "search": "t017_url_ref.datatype:%s"
        },
        {
            "id": "timeref",
            "filter": "{\"range\": {\"t01_object.time_from\": {\"gte\": \"%s0*\", \"lte\": \"%s9*\"}}}"
        },
        {
            "id": "bbox",
            "filter": "{\"bool\": {\"should\": [{\"nested\": {\"path\": \"spatial\",\"query\": {\"bool\": {\"must\": [{\"geo_bounding_box\": {\"spatial.geometries\": {\"top_left\": [%f,%f],\"bottom_right\": [%f,%f]}}},{\"exists\": {\"field\": \"spatial.geometries\"}}]}}}},{\"bool\": {\"must\": [{\"range\": {\"x1\": {\"gte\": %f}}},{\"range\": {\"y2\": {\"lte\": %f}}},{\"range\": {\"y1\": {\"gte\": %f}}},{\"range\": {\"x2\": {\"lte\": %f}}}],\"must_not\":{\"nested\":{\"path\":\"spatial\",\"query\":{\"bool\":{\"must\":[{\"exists\":{\"field\":\"spatial.geometries\"}}]}}}}}}],\"minimum_should_match\": 1}}"
        }
    ]
enabled: true
header:
  title_extend: 'AdV-MIS'
  logo_enabled: true
  logo_class: 'xsmall-15 small-15 medium-15 large-14 xlarge-15'
  menu_class: 'xsmall-9 small-7 medium-7 large-7 xlarge-6'
  menu_dropdown: true
  shrink: true
  logo_default:
    user/themes/bkg_adv_mis/images/logo/advmis_logo.png:
      name: advmis_logo.png
      full_path: advmis_logo.png
      type: image/png
      size: 5898
      path: user/themes/bkg_adv_mis/images/logo/advmis_logo.png
footer:
  logo_enabled: true
  copyright:
    text: '© Bundesamt für Kartographie und Geodäsie'
    class: 'xsmall-24 small-24 medium-24 large-24 xlarge-10'
    show_year: true
  menu_class: 'xsmall-24 small-24 medium-24 large-24 xlarge-14'
  hr_line: true
  logo_default:
    user/themes/bkg_adv_mis/images/logo/advmis_logo.png:
      name: advmis_logo.png
      full_path: advmis_logo.png
      type: image/png
      size: 5898
      path: user/themes/bkg_adv_mis/images/logo/advmis_logo.png
  share:
    enabled: false
    enabled_x: true
    enabled_mastodon: false
    enabled_facebook: true
    enabled_linkedin: true
    enabled_xing: true
    enabled_whatsapp: true
    enabled_mail: true
  print:
    enabled: false
  up:
    enabled: true
  banner:
    enabled: false
    text: 'PORTAL-NG'
menu:
  main:
    -
      path: /search
      icon: ic-ic-lupe
    -
      path: /about
      icon: ic-ic-info
  site:
    -
      path: /search
      highlighted: true
    -
      path: /about
      highlighted: true
    -
      path: /contact
      highlighted: false
    -
      path: /imprint
      highlighted: false
    -
      path: /privacy
      highlighted: false
      target_blank: true
    -
      path: /accessibility
      highlighted: false
  footer:
    -
      path: /contact
    -
      path: /imprint
    -
      path: /privacy
      target_blank: true
    -
      path: /accessibility
home:
  sort_modules:
    -
      path: /home/_search
      hidden: false
    -
      path: /home/_warning
      hidden: true
    -
      path: /home/_categories
      hidden: false
  rss:
    feeds_limit: 0
  categories:
    rss:
    add_to_search:
      - '-datatype:address'
      - '-isfolder:true'
  hits:
    query: ''
    add_to_search:
      - '-datatype:address'
      - '-isfolder:true'
    hits_num: 0
    sort:
      sortByDate: true
      emptyQuerySortByDate: true
hit_search:
  hits_num: 10
  add_to_search:
    - '-datatype:address'
    - '-isfolder:true'
  query_fields:
    - title^10.0
    - title.edge_ngram^4.0
    - title.ngram^2.0
    - summary
    - summary.edge_ngram^0.4
    - summary.ngram^0.2
    - content^0.2
    - content.ngram^0.1
  sort:
    enabled: false
    sortByDate: false
    emptyQuerySortByDate: true
  expandable:
    enabled: true
  summary_replace_newline: ' '
  summary_lines_limit: 2
  links_max: 5
  csw_enabled: true
  rdf_enabled: false
  partner_logo_enabled: false
  link_sort_asc: true
  sns:
    similar_terms:
      enabled: false
provider:
  query:
  hits_num:
  requested_fields:
  source:
    include:
    exclude:
      - content
      - idf
hit_detail:
  summary_replace_newline: ' '
  reference_system_link: 'https://spatialreference.org/ref/epsg/'
  reference_system_link_replace: 'urn:ogc:def:crs:'
  csw_enabled: true
  rdf_enabled: false
  time_in_description: true
  address_order:
    - '3'
    - '0'
    - '1'
    - '2'
  address_unlink: false
  contact_order:
    - pointOfContact
    - distributor
    - publisher
    - owner
    - processor
    - author
  display_use_constraints_json: false
  remove_use_constraints_prefix: true
  link_sort_asc: true
map:
  url:
  is_masterportal: false
  leaflet:
    epsg: '3857'
    bg:
      layer:
        wmts: { url: null }
        wms: { url: 'https://sgx.geodatenzentrum.de/wms_topplus_open?VERSION=1.3.0&SERVICE=WMS&REQUEST=GetCapabilities', name: 'web' }
        attribution: '&copy; Bundesamt f&#252;r Kartographie und Geod&#228;sie (2024)&#44; <a href=\"http://sg.geodatenzentrum.de/web_public/Datenquellen_TopPlus_Open.pdf\" target=\"_blank\">Datenquellen</a>'
        opacity: 1
    bbox:
      color: '#3278B9'
      opacity: 0.2
      weight: 1
      inverted: false
    enable:
      wkt: true
      geocoder: false
      spinloader: false
      clustering: false
    geocoder:
      enable: false
      service: 'https://nominatim.openstreetmap.org/search?countrycodes=de'
    position: 46.58,5.22,55.40,15.68
measure:
  networks:
    exclude:
    initial:
  url:
  elastic:
redirect:
  pages_to_404:
    - /api
    - /measure
    - /map
    - /catalog
    - /datasource
    - /provider
    - /help
    - /sitemap
  pages_to_redirect:
    -
      path: /privacy
      url: 'https://www.bkg.bund.de/DE/Service/Datenschutz/datenschutz.html'
catalog:
  open_nodes_level: 0
  display_partner: true
  sort_by_name: true
  open_on_new_tab: true
  address_folder_closed: false
help:
  default_hkey: about-1
datasource:
  excludes:
rss:
  feeds:
streams:
 schemes:
   theme:
     type: ReadOnlyStream
     prefixes:
       '':
         - user/themes/bkg_adv_mis
         - user/themes/bkg_mis
         - user/themes/ingrid
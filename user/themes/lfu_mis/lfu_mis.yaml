enabled: true
header:
  title_extend: 'LfU-MIS'
  logo_enabled: true
  logo_class: 'xsmall-7 small-7 medium-5 large-5 xlarge-5'
  menu_class: 'xsmall-16 small-15 medium-15 large-13 xlarge-10'
  menu_dropdown: false
  shrink: true
  logo_default:
    user/themes/lfu_mis/images/logo/logo.svg:
      name: logo.svg
      full_path: logo.svg
      type: image/svg+xml
      size: 5898
      path: user/themes/lfu_mis/images/logo/logo.svg
footer:
  logo_enabled: true
  copyright:
    text:
    class: 'xsmall-24 small-24 medium-24 large-24 xlarge-10'
    show_year: true
  menu_class: 'xsmall-24 small-24 medium-24 large-24 xlarge-14'
  hr_line: true
  logo:
  share:
    enabled: false
    enabled_x: true
    enabled_mastodon: false
    enabled_facebook: true
    enabled_linkedin: true
    enabled_xing: true
    enabled_whatsapp: true
    enabled_mail: true
  print:
    enabled: false
  up:
    enabled: true
  banner:
    enabled: false
    text: 'PORTAL-NG'
menu:
  main:
    -
      path: /search
      icon: ic-ic-lupe
    -
      path: /map
      icon: ic-ic-karten
    -
      path: /catalog
      icon: ic-ic-datenkataloge
  site:
    -
      path: /search
      highlighted: true
    -
      path: /map
      highlighted: true
    -
      path: /catalog
      highlighted: true
    -
      path: /help
      highlighted: false
    -
      path: /contact
      highlighted: false
    -
      path: /imprint
      highlighted: false
    -
      path: /accessibility
      highlighted: false
  footer:
    -
      path: /home
    -
      path: /help
    -
      path: /contact
    -
      path: /imprint
      target_blank: true
    -
      path: /accessibility
home:
  sort_modules:
    -
      path: /home/_search
      hidden: false
    -
      path: /home/_warning
      hidden: true
    -
      path: /home/_categories
      hidden: false
    -
      path: /home/_inform
      hidden: false
    -
      path: /home/_news
      hidden: true
  rss:
    feeds_limit: 6
  categories:
    rss:
    add_to_search:
      - '-datatype:address'
      - '-isfolder:true'
  hits:
    query: ''
    add_to_search:
      - '-datatype:address'
      - '-isfolder:true'
    hits_num: 0
    sort:
      sortByDate: true
      emptyQuerySortByDate: true
hit_search:
  hits_num: 10
  add_to_search:
    - '-isfolder:true'
  query_fields:
    - title^10.0
    - title.edge_ngram^4.0
    - title.ngram^2.0
    - summary
    - summary.edge_ngram^0.4
    - summary.ngram^0.2
    - content^0.2
    - content.ngram^0.1
  sort:
    enabled: false
    sortByDate: false
    emptyQuerySortByDate: true
  expandable:
    enabled: true
  summary_replace_newline: '<br>'
  summary_lines_limit: 2
  links_max: 5
  csw_enabled: true
  rdf_enabled: false
  partner_logo_enabled: false
  link_sort_asc: true
  sns:
    similar_terms:
      enabled: true
provider:
  query:
  hits_num:
  requested_fields:
  source:
    include:
    exclude:
      - content
      - idf
hit_detail:
  summary_replace_newline: '<br>'
  reference_system_link: 'https://spatialreference.org/ref/epsg/'
  reference_system_link_replace: 'urn:ogc:def:crs:'
  csw_enabled: true
  rdf_enabled: false
  time_in_description: true
  address_order:
    - '3'
    - '0'
    - '1'
    - '2'
  address_unlink: false
  contact_order:
    - pointOfContact
    - distributor
    - publisher
    - owner
    - processor
    - author
  display_use_constraints_json: false
  remove_use_constraints_prefix: true
  link_sort_asc: true
map:
  url: /ingrid-webmap-client/frontend/prd
  is_masterportal: false
  leaflet:
    epsg: '3857'
    bg:
      layer:
        wmts: { url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png' }
        wms: { url: null, name: null }
        attribution: '&copy; <a target=\"_blank\" class=\"external-link\" href=\"https://openstreetmap.org\">OpenStreetMap</a> contributors'
        opacity: 1
    bbox:
      color: '#3278B9'
      opacity: 0.2
      weight: 1
      inverted: false
    enable:
      wkt: true
      geocoder: false
      spinloader: false
      clustering: false
    geocoder:
      enable: false
      service: 'https://nominatim.openstreetmap.org/search?countrycodes=de'
    position: 46.58,5.22,55.40,15.68
measure:
  networks:
    exclude:
    initial:
  url:
  elastic:
redirect:
  pages_to_404:
    - /api
    - /measure
    - /about
    - /datasource
    - /provider
    - /privacy
    - /sitemap
  pages_to_redirect:
    - path: /imprint
      url: 'http://intranet.lfu.bybn.de/impressum/index.htm'
catalog:
  open_nodes_level: 3
  display_partner: true
  sort_by_name: true
  open_on_new_tab: true
  address_folder_closed: false
help:
  default_hkey: about-1
datasource:
  excludes:
rss:
  feeds:
streams:
 schemes:
   theme:
     type: ReadOnlyStream
     prefixes:
       '':
         - user/themes/lfu_mis
         - user/themes/ingrid
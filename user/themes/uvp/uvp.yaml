    bbox:
      color: '#26942f'
      opacity: 0.2
      weight: 1
      inverted: false
    enable:
      wkt: true
      spinloader: true
      clustering: true
    geocoder:
      enable: true
      service: 'https://geocoding.geofabrik.de/e0ed3105bbf646fb9ba3e2b92cd2703c/'

home:
  sort_modules:
    -
      path: /home/_search
      hidden: false
    -
      path: /home/_warning
      hidden: true
    -
      path: /home/_hits
      hidden: false
    -
      path: /home/_categories
      hidden: false
    -
      path: /home/_inform
      hidden: false
  rss:
    feeds_limit: 6
  categories:
    add_to_search:
      - '-datatype:address'
      - '-isfolder:true'
  hits:
    query: ''
    add_to_search:
      - '-datatype:address'
      - '-datatype:www'
      - '-isfolder:true'
    query_fields:
    requested_fields:
    source:
      include:
      exclude:
        - content
        - idf
    query_string_operator: AND
    hits_num: 2
    sort:
      sortByDate: true
      emptyQuerySortByDate: true
hit_search:
  hits_num: 10
  add_to_search:
    - '-datatype:address'
    - '-isfolder:true'
  query_fields:
    - title^10.0
    - title.edge_ngram^4.0
    - title.ngram^2.0
    - summary
    - summary.edge_ngram^0.4
    - summary.ngram^0.2
    - content^0.2
    - content.ngram^0.1
  requested_fields:
  source:
    include:
    exclude:
      - content
      - idf
  query_string_operator: AND
  sort:
    enabled: true
    sortByDate: false
    emptyQuerySortByDate: true
  expandable:
    enabled: false
  summary_replace_newline: ' '
  summary_lines_limit: 5
  links_max: 5
  csw_enabled: true
  rdf_enabled: false
  partner_logo_enabled: true
  link_sort_asc: true
  sns:
    similar_terms:
      enabled: false
provider:
  query: 'datatype:address (t02_address.typ:0 OR t02_address.typ:3)'
  hits_num: 1000
  requested_fields:
    - t021_communication.commtype_key
    - t021_communication.comm_value
  source:
    include:
      - title
      - t02_address.parents.title
      - name
      - partner
    exclude:
      - content
      - idf
hit_detail:
  summary_replace_newline: ' '
  reference_system_link: 'https://spatialreference.org/ref/epsg/'
  reference_system_link_replace: 'urn:ogc:def:crs:'
  csw_enabled: false
  rdf_enabled: false
  time_in_description: true
  address_order:
    - '3'
    - '0'
    - '1'
    - '2'
  address_unlink: false
  contact_order:
    - pointOfContact
    - distributor
    - publisher
    - owner
    - processor
    - author
  requested_fields:
  source:
    include:
    exclude:
      - content
  query_string_operator: AND
  display_use_constraints_json: true
  remove_use_constraints_prefix: false
  keywords_as_link: false
  link_sort_asc: true
map:
  url: /ingrid-webmap-client/frontend/prd
  is_masterportal: false
  leaflet:
    epsg: '3857'
    bg:
      layer:
        wmts: { url: 'https://tile.geofabrik.de/a9533739a5c445e5937b953c9b1f6c58/{z}/{x}/{y}.png' }
        wms: { url: null, name: null }
        attribution: '&copy; <a target="_blank" class="external-link" href="https://openstreetmap.org">OpenStreetMap</a> contributors <br> Die Hintergrundkarte dient der Orientierung. Kein Bezug zu den Verfahrensdaten.'

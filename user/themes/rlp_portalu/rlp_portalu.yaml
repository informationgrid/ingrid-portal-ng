      highlighted: false
    -
      path: /imprint
      highlighted: false
    -
      path: /privacy
      highlighted: false
    -
      path: /accessibility
      highlighted: false
  footer:
    -
      path: /help
    -
      path: /contact
    -
      path: /sitemap
    -
      path: /imprint
    -
      path: /privacy
    -
      path: /accessibility
home:
  sort_modules:
    -
      path: /home/_search
      hidden: false
    -
      path: /home/_warning
      hidden: true
    -
      path: /home/_categories
      hidden: true
    -
      path: /home/_inform
      hidden: true
  rss:
    feeds_limit: 6
  categories:
    rss: 'type'
    add_to_search:
      - '-datatype:address'
      - '-isfolder:true'
  hits:
    query: ''
    add_to_search:
      - '-datatype:address'
      - '-isfolder:true'
    hits_num: 0
    sort:
      sortByDate: true
      emptyQuerySortByDate: true
hit_search:
  hits_num: 10
  add_to_search:
    - '-isfolder:true'
    - '-datatype:address'
  query_fields:
    - title^10.0
    - title.edge_ngram^4.0
    - title.ngram^2.0
    - summary
    - summary.edge_ngram^0.4
    - summary.ngram^0.2
    - content^0.2
    - content.ngram^0.1
  sort:
    enabled: false
    sortByDate: false
    emptyQuerySortByDate: false
  expandable:
    enabled: true
  summary_replace_newline: '<br>'
  summary_lines_limit: 5
  links_max: 5
  csw_enabled: true
  rdf_enabled: false
  partner_logo_enabled: false
  link_sort_asc: true
  sns:
    similar_terms:
      enabled: true
provider:
  query:
  hits_num:
  requested_fields:
  source:
    include:
    exclude:
      - content
      - idf
hit_detail:
  summary_replace_newline: '<br>'
  reference_system_link: 'https://spatialreference.org/ref/epsg/'
  reference_system_link_replace: 'urn:ogc:def:crs:'
  csw_enabled: true
  rdf_enabled: false
  time_in_description: true
  address_order:
    - '3'
    - '0'
    - '1'
    - '2'
  address_unlink: false
  contact_order:
    - pointOfContact
    - distributor
    - publisher
    - owner
    - processor
    - author
  display_use_constraints_json: true
  remove_use_constraints_prefix: false
  keywords_as_link: false
  link_sort_asc: true
map:
  url: /ingrid-webmap-client/frontend/prd
  is_masterportal: false
  leaflet:
    epsg: '3857'
    bg:
      layer:
        wmts: { url: null }
        wms: { url: 'https://geo4.service24.rlp.de/wms/uekrlp.fcgi?VERSION=1.3.0&SERVICE=WMS&REQUEST=GetCapabilities', name: 'rp_uekrlp' }
        attribution: '&copy; <a target=\"_blank\" class=\"external-link\" href=\"https://openstreetmap.org\">OpenStreetMap</a> contributors'
        opacity: 1
    bbox:
      color: '#3278B9'
      opacity: 0.2
      weight: 1
      inverted: false
    enable:
      wkt: true
      geocoder: false
      spinloader: false
      clustering: false
    geocoder:
      enable: false
      service: 'https://nominatim.openstreetmap.org/search?countrycodes=de'
    position: 49.97,7.3,7
measure:
  networks:
    exclude:
      - luen
      - nlwkn
    initial:
      - odl
  url: '/mvis/index.html'
  elastic: 'https://numis.niedersachsen.de/elastic-measure-7/'
redirect:
  pages_to_404:
    - /datasource
  pages_to_redirect:
catalog:
  open_nodes_level: 3
  display_partner: false
  sort_by_name: true
  open_on_new_tab: false
  address_folder_closed: false
help:
  default_hkey: about-1
datasource:
  excludes:
rss:
  feeds:
streams:
 schemes:
   theme:
     type: ReadOnlyStream
     prefixes:
       '':
         - user/themes/rlp_portalu
         - user/themes/ingrid
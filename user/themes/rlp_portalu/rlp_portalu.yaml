  logo_enabled: true
  logo_class: 'columns xsmall-7 small-7 medium-8 large-8 xlarge-9'
  menu_class: 'columns xsmall-16 small-15 medium-15 large-13 xlarge-10'
  menu_dropdown: true
  shrink: true
  logo_default:
    user/themes/rlp_portalu/images/logo/logo.png:
      name: logo.png
      full_path: logo.png
      type: image/png
      size: 5898
      path: user/themes/rlp_portalu/images/logo/logo.png
footer:
  logo_enabled: true
  copyright:
    text: 'Ministerium für Klimaschutz, Umwelt, Energie und Mobilität'
    class: 'xsmall-24 small-24 medium-24 large-24 xlarge-8'
    show_year: false
  menu_class: 'xsmall-24 small-24 medium-24 large-24 xlarge-16'
  hr_line: true
  logo_default:
    user/themes/rlp_portalu/images/logo/logo.png:
      name: logo.png
      full_path: logo.png
      type: image/png
      size: 5898
      path: user/themes/rlp_portalu/images/logo/logo.png
  share:
    enabled: false
    enabled_x: true
    enabled_mastodon: false
    enabled_facebook: true
    enabled_linkedin: true
    enabled_xing: true
    enabled_whatsapp: true
    enabled_mail: true
  print:
    enabled: false
  up:
    enabled: true
  banner:
    enabled: false
    text: 'PORTAL-NG'
menu:
  main:
    -
      path: /search
      icon: ic-ic-lupe
    -
      path: /map
      icon: ic-ic-karten
    -
      path: /measure
      icon: ic-ic-chemie
    -
      path: /catalog
      icon: ic-ic-datenkataloge
  site:
    -
      path: /search
      highlighted: true
    -
      path: /map
      highlighted: true
    -
      path: /measure
      highlighted: true
    -
      path: /catalog
      highlighted: true
    -
      path: /about
      highlighted: true
    -

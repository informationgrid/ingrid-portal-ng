home:
    categories:
        facet_config: [
            {
                "id": "type",
                "facets": {
                    "metadata": {
                        "display_on_empty": true,
                        "icon": "ic-metadata",
                        "query": {
                            "filter": {
                                "term": {
                                    "datatype": "metadata"
                                }
                            }
                        }
                    },
                    "inspire": {
                        "display_on_empty": true,
                        "icon": "ic-inspire",
                        "query": {
                            "filter": {
                                "bool": {
                                    "should": [
                                        {
                                            "term": {
                                                "t04_search.searchterm": "inspire"
                                            }
                                        },
                                        {
                                            "term": {
                                                "t04_search.searchterm": "inspireidentifiziert"
                                            }
                                        }
                                    ]
                                }
                            }
                        },
                    },
                    "opendata": {
                        "display_on_empty": true,
                        "icon": "ic-opendata",
                        "query": {
                            "filter": {
                                "bool": {
                                    "should": [
                                        {
                                            "term": {
                                                "t04_search.searchterm": "opendata"
                                            }
                                        },
                                        {
                                            "term": {
                                                "t04_search.searchterm": "opendataident"
                                            }
                                        }
                                    ]
                                }
                            }
                        }
                    },
                    "maps": {
                        "display_on_empty": true,
                        "icon": "ic-map",
                        "query": {
                            "filter": {
                                "wildcard": {
                                    "capabilities_url": "http*"
                                }
                            }
                        }
                    }
                }
            }
        ]
hit_search:
    facet_config: [
        {
            "id": "type",
            "facets": {
                "metadata": {
                    "query": {
                        "filter": {
                            "term": {
                                "datatype": "metadata"
                            }
                        }
                    }
                },
                "inspire": {
                    "query": {
                        "filter": {
                            "bool": {
                                "should": [
                                    {
                                        "term": {
                                            "t04_search.searchterm": "inspire"
                                        }
                                    },
                                    {
                                        "term": {
                                            "t04_search.searchterm": "inspireidentifiziert"
                                        }
                                    }
                                ]
                            }
                        }
                    },
                },
                "opendata": {
                    "query": {
                        "filter": {
                            "bool": {
                                "should": [
                                    {
                                        "term": {
                                            "t04_search.searchterm": "opendata"
                                        }
                                    },
                                    {
                                        "term": {
                                            "t04_search.searchterm": "opendataident"
                                        }
                                    }
                                ]
                            }
                        }
                    }
                },
                "hvd": {
                    "query": {
                        "filter": {
                            "term": {
                                "is_hvd": "true"
                            }
                        }
                    }
                },
                "maps": {
                    "query": {
                        "filter": {
                            "wildcard": {
                                "capabilities_url": "http*"
                            }
                        }
                    }
                }
            }
        },
        {
            "id": "metadata_group",
            "facets": {
                "geoset": {
                    "codelist": "8000",
                    "codelist_entry_id": "1",
                    "query": {
                        "filter": {
                            "term": {
                                "t01_object.obj_class": "1"
                            }
                        }
                    }
                },
                "geoservice": {
                    "codelist": "8000",
                    "codelist_entry_id": "3",
                    "query": {
                        "filter": {
                            "term": {
                                "t01_object.obj_class": "3"
                            }
                        }
                    }
                },
                "database": {
                    "codelist": "8000",
                    "codelist_entry_id": "5",
                    "query": {
                        "filter": {
                            "term": {
                                "t01_object.obj_class": "5"
                            }
                        }
                    }
                }
            }
        },
        {
            "id": "modtime",
            "facets": {
                "last_month": {
                    "query": {
                        "filter": {
                            "range": {
                                "modified": {
                                    "gte": "now-1M"
                                }
                            }
                        }
                    }
                },
                "last_three_month": {
                    "query": {
                        "filter": {
                            "range": {
                                "modified": {
                                    "gte": "now-3M"
                                }
                            }
                        }
                    }
                },
                "last_year": {
                    "query": {
                        "filter": {
                            "range": {
                                "modified": {
                                    "gte": "now-1y"
                                }
                            }
                        }
                    }
                },
                "last_five_years": {
                    "query": {
                        "filter": {
                            "range": {
                                "modified": {
                                    "gte": "now-5y"
                                }
                            }
                        }
                    }
                },
                "older_five_years": {
                    "query": {
                        "filter": {
                            "range": {
                                "modified": {
                                    "lte": "now-5y"
                                }
                            }
                        }
                    }
                }
            }
        },
        {
            "id": "timeref",
            "filter": "{\"range\": {\"t01_object.time_from\": {\"gte\": \"%s0*\", \"lte\": \"%s9*\"}}}"
        }
    ]
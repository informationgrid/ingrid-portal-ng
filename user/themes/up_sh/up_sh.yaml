enabled: true
header:
  title_extend: 'UP-SH'
  logo_enabled: true
  logo_class: 'xsmall-7 small-7 medium-8 large-8 xlarge-9'
  menu_class: 'xsmall-16 small-15 medium-15 large-13 xlarge-10'
  menu_dropdown: true
  shrink: true
  logo_default:
    user/themes/up_sh/images/logo/logo.svg:
      name: logo.svg
      full_path: logo.svg
      type: image/svg+xml
      size: 5898
      path: user/themes/up_sh/images/logo/logo.svg
footer:
  logo_enabled: false
  copyright:
    text: 'Ministerium für Energiewende, Klimaschutz, Umwelt und Natur'
    class: 'xsmall-24 small-24 medium-24 large-24 xlarge-10'
    show_year: true
  menu_class: 'xsmall-24 small-24 medium-24 large-24 xlarge-14'
  hr_line: true
  logo:
  share:
    enabled: true
    enabled_x: true
    enabled_mastodon: false
    enabled_facebook: true
    enabled_linkedin: true
    enabled_xing: true
    enabled_whatsapp: true
    enabled_mail: true
  print:
    enabled: false
  up:
    enabled: true
  banner:
    enabled: false
    text: 'PORTAL-NG'
menu:
  main:
    -
      path: /search
      icon: ic-ic-lupe
    -
      path: /map
      icon: ic-ic-karten
    -
      path: /measure
      icon: ic-ic-chemie
    -
      path: /catalog
      icon: ic-ic-datenkataloge
  site:
    -
      path: /search
      highlighted: true
    -
      path: /map
      highlighted: true
    -
      path: /measure
      highlighted: true
    -
      path: /catalog
      highlighted: true
    -
      path: /about
      highlighted: true
    -
      path: /provider
      highlighted: true
    -
      path: /help
      highlighted: false
    -
      path: /contact
      highlighted: false
    -
      path: /sitemap
      highlighted: false
    -
      path: /imprint
      highlighted: false
    -
      path: /privacy
      highlighted: false
    -
      path: /accessibility
      highlighted: false
  footer:
    -
      path: /help
    -
      path: /contact
    -
      path: /sitemap
    -
      path: /imprint
    -
      path: /privacy
    -
      path: /accessibility
home:
  sort_modules:
    -
      path: /home/_search
      hidden: false
    -
      path: /home/_warning
      hidden: true
    -
      path: /home/_news
      hidden: false
    -
      path: /home/_categories
      hidden: false
    -
      path: /home/_inform
      hidden: false
  rss:
    feeds_limit: 6
  categories:
    rss: 'type'
    add_to_search:
      - '-datatype:address'
      - '-isfolder:true'
  hits:
    query: ''
    add_to_search:
      - '-datatype:address'
      - '-isfolder:true'
    hits_num: 0
    sort:
      sortByDate: true
      emptyQuerySortByDate: true
hit_search:
  hits_num: 10
  add_to_search:
    - '-datatype:address'
    - '-isfolder:true'
  query_fields:
    - title^10.0
    - title.edge_ngram^4.0
    - title.ngram^2.0
    - summary
    - summary.edge_ngram^0.4
    - summary.ngram^0.2
    - content^0.2
    - content.ngram^0.1
  sort:
    enabled: false
    sortByDate: false
    emptyQuerySortByDate: true
  expandable:
    enabled: true
  summary_replace_newline: '<br>'
  summary_lines_limit: 2
  links_max: 5
  csw_enabled: true
  rdf_enabled: false
  partner_logo_enabled: false
  link_sort_asc: false
  sns:
    similar_terms:
      enabled: true
provider:
  query:
  hits_num:
  requested_fields:
  source:
    include:
    exclude:
      - content
      - idf
hit_detail:
  summary_replace_newline: '<br>'
  reference_system_link: 'https://spatialreference.org/ref/epsg/'
  reference_system_link_replace: 'urn:ogc:def:crs:'
  csw_enabled: true
  rdf_enabled: false
  time_in_description: true
  address_order:
    - '3'
    - '0'
    - '1'
    - '2'
  address_unlink: false
  contact_order:
    - pointOfContact
    - distributor
    - publisher
    - owner
    - processor
    - author
  display_use_constraints_json: true
  remove_use_constraints_prefix: false
  keywords_as_link: true
  link_sort_asc: false
map:
  url: /ingrid-webmap-client/frontend/prd
  is_masterportal: false
  leaflet:
    epsg: '3857'
    bg:
      layer:
        wmts: { url: 'https://tile.geofabrik.de/a9533739a5c445e5937b953c9b1f6c58/{z}/{x}/{y}.png' }
        wms: { url: null, name: null }
        attribution: '&copy; <a target=\"_blank\" class=\"external-link\" href=\"https://openstreetmap.org\">OpenStreetMap</a> contributors'
        opacity: 1
    bbox:
      color: '#3278B9'
      opacity: 0.2
      weight: 1
      inverted: false
    enable:
      wkt: true
      geocoder: false
      spinloader: false
      clustering: false
    geocoder:
      enable: false
      service: 'https://nominatim.openstreetmap.org/search?countrycodes=de'
    position: 46.58,5.22,55.40,15.68
measure:
  networks:
    exclude:
    initial:
      - uba
  url: '/mvis/index.html'
  elastic: 'https://umweltportal.schleswig-holstein.de/elastic-measure/'
redirect:
  pages_to_404:
    - /api
    - /datasource
  pages_to_redirect:
catalog:
  open_nodes_level: 3
  display_partner: false
  sort_by_name: true
  open_on_new_tab: true
  address_folder_closed: false
help:
  default_hkey: about-1
datasource:
  excludes:
rss:
  feeds:
    - url: 'https://www.schleswig-holstein.de/DE/landesportal/service/RSS/RSS_PI_V/RSSNewsfeed_PI_V.xml'
      summary: ''
      provider: 'MELUND'
      lang: de
      category: all
    - url: 'https://www.umweltbundesamt.de/rss/presse'
      summary: 'Ministerium für Klimaschutz, Landwirtschaft, ländliche Räume und Umwelt - Aktuelles.'
      provider: 'UBA'
      lang: de
      category: all
    - url: 'https://www.bmuv.de/index.php?id=103&type=704'
      summary: ''
      provider: 'BMUV'
      lang: de
      category: all
    - url: 'https://www.bmuv.de/events.rss'
      summary: ''
      provider: 'BMUV'
      lang: de
      category: all
streams:
 schemes:
   theme:
     type: ReadOnlyStream
     prefixes:
       '':
         - user/themes/up_sh
         - user/themes/ingrid

